<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIYAM - Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="store-header">
        <a href="#" class="logo">SIYAM<span class="dot">.</span></a>
        <nav class="nav-links">
            <ul>
                <li><a href="#" class="active">HOME</a></li>
                <li><a href="#shop">SHOP</a></li>
            </ul>
        </nav>
        <div class="header-actions">
            <a href="#" class="action-btn">
                <i class="fas fa-shopping-bag"></i>
                <span class="badge">0</span>
            </a>
        </div>
    </header>

    <main>
        <section class="hero-banner">
            <div class="hero-bg-image">
                <img src="your-profile-image.jpg" alt="Hero Image" class="hero-main-img">
                <div class="overlay"></div>
            </div>
            <div class="hero-text-content">
                <h1 class="main-title">THE KONNAKOL COLLECTION</h1>
                <a href="#shop" class="btn btn-solid">SHOP NOW</a>
            </div>
        </section>

        <section class="products-marketplace" id="shop">
            <div class="product-matrix">
                
                <div class="store-card">
                    <div class="product-image-wrapper">
                        <img src="https://via.placeholder.com/400x450/0f0f0f/3fa37b?text=PRODUCT+1" alt="Product">
                    </div>
                    <div class="product-details">
                        <h3 class="product-title">Konnakol Digital Deluxe Vinyl</h3>
                        <div class="price-box"><span class="current-price">$36.00</span></div>
                        <button class="add-to-cart-btn">Add to Cart</button>
                    </div>
                </div>

                <div class="store-card">
                    <div class="product-image-wrapper">
                        <img src="https://via.placeholder.com/400x450/0f0f0f/3fa37b?text=PRODUCT+2" alt="Product">
                    </div>
                    <div class="product-details">
                        <h3 class="product-title">Siyam Signature Neon Hoodie</h3>
                        <div class="price-box"><span class="current-price">$65.00</span></div>
                        <button class="add-to-cart-btn">Add to Cart</button>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <footer class="store-footer">
        <p>&copy; 2026 SIYAM. All Rights Reserved.</p>
    </footer>

</body>
</html>
