<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Siyam</title>
    <link rel="stylesheet" href="style.css">
    <!-- Optional: Add a stylized font like Merriweather or permanent marker from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:ital,wght@1,700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Header Navigation -->
    <header>
        <div class="logo">SIYAM</div>
        <nav>
            <ul>
                <li><a href="#shop">SHOP</a></li>
                <li><a href="#music">MUSIC</a></li>
                <li><a href="#videos">VIDEOS</a></li>
                <li><a href="#tour">TOUR</a></li>
                <li><a href="#signup">SIGN UP</a></li>
            </ul>
        </nav>
    </header>

    <!-- Hero / Main Showcase Section -->
    <section class="hero">
        <div class="hero-content">
            <h2 class="main-title-bg">SIYAM</h2>
            <h1 class="main-title-glow">KONNAKOL</h1>
            <p class="subtitle">- OUT NOW -</p>
            <a href="#" class="cta-btn">STREAM / DOWNLOAD</a>
        </div>
    </section>

    <!-- Product Grid Section -->
    <section class="products-section" id="shop">
        <div class="product-grid">
            
            <!-- Item 1 -->
            <div class="product-card">
                <div class="img-container">
                    <img src="https://via.placeholder.com/300x300/111/00ffaa?text=Deluxe+Vinyl" alt="Konnakol Digital Deluxe">
                </div>
                <h3>KONNAKOL DIGITAL DELUXE</h3>
            </div>

            <!-- Item 2 -->
            <div class="product-card">
                <div class="img-container">
                    <img src="https://via.placeholder.com/300x300/111/00ffaa?text=Exclusive+Vinyl" alt="Store Exclusive First">
                </div>
                <h3>STORE EXCLUSIVE: FIRST</h3>
            </div>

            <!-- Item 3 -->
            <div class="product-card">
                <div class="img-container">
                    <img src="https://via.placeholder.com/300x300/111/00ffaa?text=Limited+Edition" alt="Limited Edition Cover">
                </div>
                <h3>LIMITED EDITION COVER + 5TH</h3>
            </div>

            <!-- Item 4 -->
            <div class="product-card">
                <div class="img-container">
                    <img src="https://via.placeholder.com/300x300/111/00ffaa?text=CD+Album" alt="Konnakol CD">
                </div>
                <h3>KONNAKOL CD</h3>
            </div>

        </div>
    </section>

</body>
</html>
